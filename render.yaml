services:
  - type: web
    name: image-2-mobile-studio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_BASE_URL
        value: https://openclaw-api.com
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: ./data/app.db
      - key: STARTER_CREDITS
        value: 3
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BILLING_ENABLED
        value: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: BUSINESS_NAME
        value: Image 2 Studio
      - key: SUPPORT_EMAIL
        sync: false
